services:
  errexd:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: errexd:latest
    container_name: errexd
    restart: unless-stopped
    ports:
      # 9090 = HTTP + WS (axum upgrade); 9092 = MCP stub.
      - "9090:9090"
      - "9092:9092"
    volumes:
      # Named volume so /data inherits the image's UID 1000 ownership.
      # A host bind (e.g. ../data:/data) clobbers those perms with the host
      # dir's owner, which makes SQLite fail to open the DB on any host
      # whose UID isn't 1000. Power users who want a host-path bind should
      # pre-create the dir with `chown 1000:1000` and swap this line.
      - errex-data:/data
    environment:
      ERREX_DATA_DIR: /data
      ERREX_LOG_LEVEL: info
      # Container-only: bind on all interfaces so the docker port mapping
      # above can reach the process. The daemon itself defaults to
      # 127.0.0.1 — it is exposed publicly only because compose explicitly
      # opts in here.
      ERREX_HOST: 0.0.0.0
      ERREX_MCP_HOST: 0.0.0.0
      # Setup token MUST be supplied by the operator. We deliberately do
      # NOT default to "123" — anyone who can reach the listener on a
      # fresh deploy could otherwise hit /api/auth/setup with that value
      # and become admin. Set it via your shell or a `.env` file:
      #   ERREX_ADMIN_TOKEN=$(openssl rand -hex 32) docker compose up
      # An empty value here disables the setup endpoint (503), which is
      # safer than a guessable default.
      ERREX_ADMIN_TOKEN: ${ERREX_ADMIN_TOKEN:-}

volumes:
  errex-data:
